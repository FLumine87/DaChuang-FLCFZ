services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./backend/data/dev.db:/app/mental_screening.db
    environment:
      - DATABASE_URL=sqlite:///./mental_screening.db
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=True
      - ENABLE_MOCK_ENGINES=True
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
